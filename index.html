function list(items){ return `<ul>${items.map(x=>`<li>${x}</li>`).join("")}</ul>`; }
function render(d,i){
  return `<section class="page" id="day-${i+1}" style="--accent:${d.accent}">
    <div class="hero"><img src="${d.img}" alt="${d.title}"><div class="day-badge">${d.day}</div><div class="title-wrap"><h1>${d.title}</h1><div class="subtitle">${d.sub}</div></div></div>
    <div class="content">
      <div class="mission"><div class="mission-label">今日核心</div><div class="mission-text">${d.mission}</div></div>
      <div class="main">
        <section class="panel"><h2>時間軸與執行重點</h2><div class="timeline">${d.timeline.map(x=>`<div class="slot"><div class="time">${x[0]}</div><div class="rail"></div><div class="event"><b>${x[1]}</b><span>${x[2]}</span></div></div>`).join("")}</div></section>
        <aside class="side">
          <div class="box must"><h3>★ 今天一定要完成</h3>${list(d.must)}</div>
          <div class="box stop"><h3>⏱ 硬截止與刪減規則</h3>${list(d.stop)}</div>
          <div class="box kids"><h3>☀ 親子體力／備品提醒</h3>${list(d.kids)}</div>
        </aside>
      </div>
      <div class="note"><strong>記住這句</strong><span>${d.note}</span></div>
    </div>
    <div class="footer">2026 名古屋・河口湖・靜岡親子十日旅｜資料更新 2026/7/17</div>
  </section>`;
}
document.getElementById("book").innerHTML = days.map(render).join("");
const renderDay = Number(new URLSearchParams(location.search).get("renderDay"));
if (renderDay >= 1 && renderDay <= days.length) {
  document.body.classList.add("render-mode");
  document.querySelectorAll(".page").forEach((page, index) => {
    if (index + 1 !== renderDay) page.remove();
  });
}
